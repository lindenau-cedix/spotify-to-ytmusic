<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}spotify-to-ytmusic{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    [x-cloak] { display: none !important; }
    .pill { @apply inline-block px-2 py-0.5 rounded text-xs font-semibold; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-slate-900 text-white">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold">spotify-to-ytmusic</a>
      <nav class="space-x-4 text-sm">
        <a href="/" class="hover:underline">Dashboard</a>
        <a href="/review" class="hover:underline">Review</a>
        <a href="https://github.com/" class="hover:underline opacity-50" title="see README">Help</a>
      </nav>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
